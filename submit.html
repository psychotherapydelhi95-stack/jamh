<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Paper | Journal of Addiction and Mental Health</title>
  <link rel="stylesheet" href="assets/style.css" />

  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    body { background:#f4f7fb; }
    .submission-container {
      max-width:700px; margin:60px auto; background:#fff;
      padding:40px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }
    label { font-weight:600; }
    button {
      background:#004080; color:white; padding:12px;
      border:none; border-radius:6px; cursor:pointer;
    }
    button:hover { background:#003366; }
  </style>
</head>
<body>

<header>
  <h1>Journal of Addiction and Mental Health</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="submission.html" style="color:#ffd700;">Submit Paper</a>
  </nav>
</header>

<div class="submission-container">
  <h2>Manuscript Submission</h2>

  <form id="submissionForm"
        action="https://formspree.io/f/xqawgbwn"
        method="POST"
        enctype="multipart/form-data">

    <label>Author Name</label>
    <input type="text" name="Author" required>

    <label>Email</label>
    <input type="email" name="Email" required>

    <label>Affiliation</label>
    <input type="text" name="Affiliation" required>

    <label>Paper Title</label>
    <input type="text" name="Title" required>

    <label>Abstract</label>
    <textarea name="Abstract" required></textarea>

    <label>Upload Manuscript (.docx/.pdf, max 10MB)</label>
    <input type="file" id="fileUpload" name="Manuscript" accept=".doc,.docx,.pdf" required>

    <!-- GOOGLE RECAPTCHA -->
    <div class="g-recaptcha" data-sitekey="6LeUqA4sAAAAAOSafXBLDIfNdhzQFM5O5toL_gAB"></div>
    <br>

    <button type="submit">Submit Manuscript</button>

  </form>
</div>

<script>
  // === FILE SIZE LIMIT (10 MB) ===
  document.getElementById("fileUpload").addEventListener("change", function () {
    const file = this.files[0];
    if (file.size > 10 * 1024 * 1024) {   // 10 MB
      alert("File is too large! Maximum allowed size is 10 MB.");
      this.value = ""; // clear file
    }
  });

  // === Formspree Submission + Redirect ===
  const form = document.getElementById("submissionForm");
  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = new FormData(form);

    const response = await fetch(form.action, {
      method: "POST",
      body: formData
    });

    if (response.ok) {
      window.location.href = "thankyou.html";   // redirect
    } else {
      alert("Submission failed. Please try again later.");
    }
  });
</script>

</body>
</html>
